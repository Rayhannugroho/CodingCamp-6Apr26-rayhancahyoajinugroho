<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Theme Toggle -->
  <button id="theme-toggle" aria-label="Toggle light/dark mode">🌙</button>

  <main class="dashboard">

    <!-- Greeting -->
    <section class="card greeting-card">
      <div id="greeting-time" class="time"></div>
      <div id="greeting-date" class="date"></div>
      <div id="greeting-salutation" class="salutation"></div>
      <div class="name-wrap">
        <span id="greeting-name" class="name" title="Click to edit your name"></span>
      </div>
    </section>

    <!-- Focus Timer -->
    <section class="card timer-card">
      <h2>Focus Timer</h2>
      <div id="timer-display" class="timer-display" title="Click to set custom time">25:00</div>
      <p class="timer-hint">Click the time to edit</p>
      <div class="timer-controls">
        <button id="timer-start" aria-pressed="false">Start</button>
        <button id="timer-stop">Stop</button>
        <button id="timer-reset">Reset</button>
      </div>
      <div class="timer-presets">
        <span class="preset-label">Presets:</span>
        <button class="preset-btn" data-minutes="5">5m</button>
        <button class="preset-btn" data-minutes="10">10m</button>
        <button class="preset-btn" data-minutes="25">25m</button>
        <button class="preset-btn" data-minutes="45">45m</button>
        <button class="preset-btn" data-minutes="60">60m</button>
      </div>
    </section>

    <!-- To-Do List -->
    <section class="card todo-card">
      <h2>To-Do</h2>
      <div class="todo-input-row">
        <input id="task-input" type="text" placeholder="Add a task…" aria-label="New task" />
        <button id="task-add">Add</button>
      </div>
      <p id="task-error" class="error-msg" aria-live="polite"></p>
      <div class="sort-row">
        <button id="sort-btn">Sort: Default</button>
      </div>
      <ul id="task-list" aria-label="Task list"></ul>
    </section>

    <!-- Quick Links -->
    <section class="card links-card">
      <h2>Quick Links</h2>
      <div class="link-input-row">
        <input id="link-label" type="text" placeholder="Label" aria-label="Link label" />
        <input id="link-url" type="text" placeholder="e.g. google.com" aria-label="Link URL" />
        <button id="link-add">Add</button>
      </div>
      <p id="link-error" class="error-msg" aria-live="polite"></p>
      <div id="links-panel" class="links-panel"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
